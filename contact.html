<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contact page</title>
</head>
<body>
      <h2><a href="./index.html"></a></h2>
    <link rel="stylesheet" href="./style.css">
  <title> local cafe | Contact</title>
</head>
<body>
  <header>
    <!-- Div Section 1: Navbar -->
    <nav id="navbar">
      <div class="container nx-flex">
        <h2><a href="./index.html">local cafe</a></h2>
        <ul>
          <li><a href="./index.html">Home</a></li>
          <li><a href="./about.html">About</a></li>
          <li><a href="./contact.html" class="current">Contact</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <!-- NEW DIV 2: Contact Section -->
  <section id="contact-form" class="py-1">
    <div class="container">
      <h1 class="text-heading"><span class="text-primary">Contact</span> Us</h1>
      <p>Please fill out the form below to contact us</p>
      <form action="#">
        <!-- INPUT GROUP 1: NAME -->
        <div class="input-group">
          <label for="name">Name</label>
          <input type="text" id="name">
        </div>
        <!-- INPUT GROUP 2: EMAIL -->
        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email">
        </div>
        <!-- INPUT GROUP 3: MESSAGE -->
        <div class="input-group">
          <label for="message">Message</label>
          <textarea id="message"></textarea>
        </div>
        <!-- INPUT 4: SUBMIT BUTTON -->
        <button type="submit" class="btn">Submit</button>
      </form>
    </div>
  </section>

  <!-- NEW DIV 3: Contact Cards Section -->
  <section id="features" class="text-center bg-dark">
    <div class="container">
      <div class="card">
        <i class="fas fa-hotel fa-3x"></i>
        <h3>Location</h3>
        <p>1313 mocking bird lane</p>
      </div>
      <div class="card">
        <i class="fas fa-phone fa-3x"></i>
        <h3>Phone Number</h3>
        <p>0000-1356</p>
      </div>
      <div class="card">
        <i class="fas fa-envelope fa-3x"></i>
        <h3>Email Address</h3>
        <p>helpdesk.com.au/localcafehelp</p>
      </div>
    </div>
  </section>

  <!-- Div Section 4: Footer -->
  <footer id="footer">
    <div class="container text-center">
      <h4>My Website &copy; 2026</h4>
    </div>
  </footer>
</body>
</html>
</body>
</html>
